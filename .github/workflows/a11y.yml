name: Accessibility Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  accessibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npm run preview -- --host 127.0.0.1 --port 4173 &

      - name: Wait for preview server
        run: npx wait-on http://127.0.0.1:4173

      - name: Run axe accessibility checks
        run: npm run a11y:axe

      - name: Run Lighthouse accessibility report
        run: npm run a11y:lighthouse

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-accessibility-report
          path: reports/lighthouse-accessibility.html
